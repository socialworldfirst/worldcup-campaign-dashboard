<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst &times; AFA — World Cup campaign</title>
<style>
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:#fff;color:#111;
 font:400 15px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Helvetica,Arial,sans-serif;
 -webkit-font-smoothing:antialiased}
a{color:inherit}
code{font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:#666;background:#f6f6f6;padding:1px 5px;border-radius:3px}
.shell{display:flex;align-items:flex-start;max-width:1360px;margin:0 auto}

/* nav */
.nav{position:sticky;top:0;flex:0 0 260px;height:100vh;padding:44px 30px 30px 40px;overflow-y:auto}
.navin{display:flex;flex-direction:column;height:100%}
.brandline{font-size:14px;font-weight:600;letter-spacing:-.01em}
.brandsub{margin-top:5px;font-size:12.5px;line-height:1.45;color:#8a8a8a}
.navlist{list-style:none;margin:34px 0 0;padding:0;flex:1}
.navlist li{margin:0 0 1px}
.navlist a{display:flex;gap:11px;align-items:baseline;text-decoration:none;color:#8a8a8a;
 font-size:13.5px;padding:6px 0;transition:color .15s}
.navlist a:hover{color:#111}
.navlist a.on{color:#111;font-weight:500}
.nn{font-size:10.5px;color:#c4c4c4;font-variant-numeric:tabular-nums;min-width:17px}
.navlist a.on .nn{color:#E5175B}
.navfoot{font-size:11.5px;color:#b0b0b0;line-height:1.6;padding-top:20px;border-top:1px solid #eee}
.navfoot a{color:#b0b0b0}
.navfoot a:hover{color:#111}

/* main */
.main{flex:1;min-width:0;padding:44px 56px 100px;border-left:1px solid #eee}
.hd{padding-bottom:44px;border-bottom:1px solid #eee}
h1{margin:0;font-size:40px;line-height:1.1;letter-spacing:-.028em;font-weight:600}
.lede{margin:20px 0 0;max-width:780px;font-size:16.5px;line-height:1.6;color:#4a4a4a}
.sec{padding:56px 0;border-bottom:1px solid #eee}
.sec:last-of-type{border-bottom:0}
.sechd{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
.secn{font-size:11px;color:#c4c4c4;font-variant-numeric:tabular-nums}
h2{margin:0;font-size:24px;letter-spacing:-.02em;font-weight:600}
h3.sub{margin:40px 0 14px;font-size:15px;font-weight:600;letter-spacing:-.01em}
.secnote{margin:6px 0 26px;max-width:760px;color:#6a6a6a;font-size:14.5px}
.secnote.sm{margin-top:16px;font-size:13px;color:#9a9a9a}

/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#eee;
 border-top:1px solid #eee;border-bottom:1px solid #eee;margin-bottom:36px}
.kpi{background:#fff;padding:20px 22px 22px;min-width:0}
.kl{font-size:11.5px;color:#9a9a9a;letter-spacing:.02em}
.kv{margin-top:7px;font-size:25px;font-weight:600;letter-spacing:-.025em;font-variant-numeric:tabular-nums;
 overflow-wrap:anywhere}
.ks{margin-top:5px;font-size:12px;color:#a8a8a8;line-height:1.4;overflow-wrap:anywhere}

/* tables */
.tbox{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.t{width:100%;border-collapse:collapse;font-size:13.5px;font-variant-numeric:tabular-nums}
table.t.sm{font-size:12.5px}
table.t th{text-align:left;font-weight:500;color:#9a9a9a;font-size:11.5px;letter-spacing:.02em;
 padding:0 14px 9px 0;border-bottom:1px solid #ddd;white-space:nowrap}
table.t td{padding:11px 14px 11px 0;border-bottom:1px solid #f2f2f2;white-space:nowrap}
table.t th.r,table.t td.r{text-align:right;padding-right:0}
table.t th:last-child,table.t td:last-child{padding-right:0}
table.t tr.tot td{border-bottom:0;border-top:1px solid #ddd;font-weight:600;padding-top:12px}
.dim{color:#a0a0a0}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#E5175B;margin-right:9px;vertical-align:middle}
.barw{display:inline-block;width:64px;height:4px;background:#f0f0f0;border-radius:2px;
 vertical-align:middle;margin-right:10px;overflow:hidden}
.bar{display:block;height:100%;background:#E5175B;border-radius:2px}
.pct{display:inline-block;min-width:30px;color:#7a7a7a}

/* waves */
.waves{display:flex;flex-direction:column;gap:1px;background:#eee;border-top:1px solid #eee;border-bottom:1px solid #eee}
.wave{background:#fff;padding:26px 0 28px}
.wavehd{display:flex;gap:16px;align-items:baseline}
.waven{font-size:11px;color:#E5175B;font-variant-numeric:tabular-nums;min-width:17px;font-weight:600}
.wave h3{margin:0;font-size:17px;font-weight:600;letter-spacing:-.015em}
.wavemeta{margin-top:4px;font-size:12.5px;color:#a0a0a0}
.wavesum{margin:14px 0 0 33px;max-width:740px;color:#4a4a4a;font-size:14.5px;line-height:1.6}
.wavestats{display:flex;flex-wrap:wrap;gap:34px;margin:18px 0 0 33px}
.wavestats div{display:flex;flex-direction:column;gap:3px}
.wl{font-size:11px;color:#a8a8a8;letter-spacing:.02em}
.wv{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.015em}

/* wave: creative strip + destination */
.waveblk{margin:24px 0 0 33px;padding-top:20px;border-top:1px solid #f2f2f2}
.wbl{font-size:11px;color:#a8a8a8;letter-spacing:.02em;margin-bottom:13px}
.thumbs{display:flex;flex-wrap:wrap;gap:16px}
.thumb{display:flex;flex-direction:column;width:104px;text-decoration:none;color:inherit}
.tim{display:block;width:104px;aspect-ratio:4/5;overflow:hidden;background:#fafafa;border:1px solid #f0f0f0;border-radius:3px}
.tim img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .15s}
.thumb:hover .tim img{opacity:.8}
.tim.tnone{display:flex;align-items:center;justify-content:center;text-align:center}
.tim.tnone span{font-size:10.5px;color:#c0c0c0;line-height:1.4;padding:0 8px}
.tcap{margin-top:8px;font-size:11.5px;line-height:1.35;font-weight:500;letter-spacing:-.005em}
.thumb:hover .tcap{text-decoration:underline;text-underline-offset:2px}
.tsub{margin-top:2px;font-size:10.5px;color:#b0b0b0}
.ctaline{font-size:13.5px;margin-bottom:10px}
.lps{list-style:none;margin:0;padding:0}
.lps li{margin:0 0 6px;font-size:13.5px;display:flex;flex-wrap:wrap;gap:10px;align-items:baseline}
.lps a{color:#111;text-decoration:none;border-bottom:1px solid #ddd;padding-bottom:1px;
 font:13px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;overflow-wrap:anywhere;min-width:0}
.lps a:hover{border-color:#111}
.lpsrc{font-size:11px;color:#b8b8b8}
.lpnote{margin:12px 0 0;max-width:740px;font-size:12.5px;line-height:1.6;color:#9a9a9a}
.lpnote code{font-size:11.5px}

/* ledger accordion */
.ledger{border-top:1px solid #eee}
.lrow{border-bottom:1px solid #eee}
.lhd{display:grid;grid-template-columns:34px 1fr 108px 118px 108px 22px;align-items:center;gap:14px;
 width:100%;background:none;border:0;padding:15px 0;cursor:pointer;text-align:left;font:inherit;color:inherit}
.lhd:hover{background:#fbfbfb}
.lwave{font-size:10.5px;color:#c0c0c0;font-weight:600;letter-spacing:.03em}
.lhd.open .lwave{color:#E5175B}
.lname{font-size:14.5px;font-weight:500;letter-spacing:-.01em;display:flex;flex-direction:column;gap:3px;
 min-width:0;overflow-wrap:anywhere}
.lmeta{font-size:12px;font-weight:400;color:#a0a0a0;letter-spacing:0}
.lnum{text-align:right;font-size:13.5px;font-variant-numeric:tabular-nums}
.chev{width:8px;height:8px;border-right:1.4px solid #c0c0c0;border-bottom:1.4px solid #c0c0c0;
 transform:rotate(45deg) translate(-2px,-2px);transition:transform .2s;justify-self:end}
.lhd.open .chev,.copytog.open .chev{transform:rotate(-135deg) translate(-3px,-3px);border-color:#111}
.lbody{display:none;padding:2px 0 28px}
.lbody.open{display:block}
.what{margin:0 0 22px;max-width:760px;color:#4a4a4a;font-size:14.5px;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:#f0f0f0;
 border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0}
.gc{background:#fff;padding:13px 14px 14px;display:flex;flex-direction:column;gap:5px;min-width:0}
.gl{font-size:10.5px;color:#a8a8a8;letter-spacing:.02em}
.gv{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.015em}
.lfoot{display:flex;flex-wrap:wrap;gap:26px;margin-top:16px;font-size:11.5px;color:#a8a8a8}

/* creative cards */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#eee;
 border-top:1px solid #eee;border-bottom:1px solid #eee}
.card{background:#fff;display:flex;flex-direction:column}
.cimg{background:#fafafa;line-height:0}
.cimg img{width:100%;height:auto;display:block}
.cimg.noimg{aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;
 color:#c8c8c8;font-size:12px;text-align:center;line-height:1.6}
.cbody{padding:20px 22px 24px;display:flex;flex-direction:column;flex:1}
.cmeta{display:flex;gap:12px;font-size:11px;color:#a8a8a8;margin-bottom:9px;flex-wrap:wrap}
.cw{color:#E5175B;font-weight:600}
.card h3{margin:0;font-size:15.5px;font-weight:600;letter-spacing:-.015em;line-height:1.35}
.chead{margin-top:13px;font-size:13.5px;color:#333;line-height:1.5}
.clab{display:block;font-size:10.5px;color:#b0b0b0;letter-spacing:.02em;margin-bottom:3px}
.copytog{margin:15px 0 0;background:none;border:0;padding:0;cursor:pointer;font:inherit;
 font-size:12.5px;color:#7a7a7a;display:flex;align-items:center;gap:8px}
.copytog:hover{color:#111}
.copytog .chev{width:6px;height:6px;justify-self:auto}
.copy{display:none;margin-top:12px;padding-left:13px;border-left:1px solid #eee}
.copy.open{display:block}
.copy p{margin:0 0 9px;font-size:13px;line-height:1.6;color:#555}
.copy p:last-child{margin-bottom:0}
.cnote{margin:15px 0 0;font-size:12.5px;line-height:1.55;color:#9a9a9a;flex:1}
.clinks{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid #f2f2f2}
.clinks a{font-size:12.5px;color:#111;text-decoration:none;border-bottom:1px solid #ddd;padding-bottom:1px}
.clinks a:hover{border-color:#111}
.ctatag{font-size:11.5px;color:#a8a8a8}

/* notes */
.notes{max-width:800px}
.notes h3{margin:30px 0 8px;font-size:14.5px;font-weight:600;letter-spacing:-.01em}
.notes h3:first-child{margin-top:0}
.notes p{margin:0 0 6px;color:#5a5a5a;font-size:14.5px;line-height:1.65}
.notes .tbox{margin-top:18px}

.ft{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;
 margin-top:56px;padding-top:24px;border-top:1px solid #eee;font-size:11.5px;color:#b0b0b0}
.ft a{color:#b0b0b0}
.ft a:hover{color:#111}

@media(max-width:1080px){
 .kpis{grid-template-columns:repeat(2,1fr)}
 .grid{grid-template-columns:repeat(3,1fr)}
 .cards{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:820px){
 /* align-items:flex-start would let .main shrink-to-fit its min-content and
    blow past the viewport; stretch pins it to the container instead */
 .shell{flex-direction:column;align-items:stretch}
 .main{width:100%}
 .kpis{grid-template-columns:1fr}
 .waveblk{margin-left:0}
 .thumb{width:88px}
 .tim{width:88px}
 .nav{position:static;height:auto;flex:none;width:100%;padding:28px 22px 0}
 .navlist{display:flex;flex-wrap:wrap;gap:0 18px;margin-top:18px}
 .navfoot{display:none}
 .main{padding:28px 22px 70px;border-left:0}
 h1{font-size:29px}
 .lede{font-size:15px}
 .cards{grid-template-columns:1fr}
 .grid{grid-template-columns:repeat(2,1fr)}
 .lhd{grid-template-columns:28px 1fr 18px;gap:10px}
 .lhd .lnum{display:none}
 .wavesum,.wavestats{margin-left:0}
 .wavestats{gap:22px}
}

body.locked{overflow:hidden}
#wc-gate{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:99}
#wc-card{width:290px;text-align:center}
#wc-card h2{margin:0 0 4px;font-size:15px;font-weight:600;letter-spacing:-.01em}
#wc-card p{margin:0 0 22px;font-size:12.5px;color:#a8a8a8}
#wc-form{display:flex;gap:8px}
#wc-input{flex:1;padding:9px 12px;border:1px solid #ddd;border-radius:6px;font:inherit;font-size:14px;outline:none}
#wc-input:focus{border-color:#111}
#wc-btn{padding:9px 16px;border:0;border-radius:6px;background:#111;color:#fff;font:inherit;font-size:13.5px;cursor:pointer}
#wc-err{margin-top:11px;font-size:12px;color:#E5175B;min-height:15px}
</style>
</head>

<script>
function b64ToBytes(b64){const bin=atob(b64);const b=new Uint8Array(bin.length);
 for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b}
async function deriveKey(pw,salt,it){const enc=new TextEncoder();
 const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,
  {name:"AES-GCM",length:256},false,["decrypt"])}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('wc-payload').textContent);
 const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);
 const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));
 return new TextDecoder().decode(plain)}
function reveal(html){
 const c=document.getElementById('wc-content');
 if(c.dataset.done==='1')return;
 c.innerHTML=html;c.hidden=false;c.dataset.done='1';
 document.getElementById('wc-gate').style.display='none';
 document.body.classList.remove('locked');
 wire();
}

function wire(){
 // one-at-a-time accordions, scoped per group
 document.querySelectorAll('[data-acc]').forEach(btn=>{
  btn.addEventListener('click',()=>{
   const id='acc-'+btn.dataset.acc;
   const panel=document.getElementById(id);
   if(!panel)return;
   const open=panel.classList.contains('open');
   const group=btn.classList.contains('copytog')?'copytog':'lhd';
   document.querySelectorAll('.'+group).forEach(b=>{
    const p=document.getElementById('acc-'+b.dataset.acc);
    if(p){p.classList.remove('open')}
    b.classList.remove('open');
   });
   if(!open){panel.classList.add('open');btn.classList.add('open')}
  });
 });
 // scrollspy
 const links=[...document.querySelectorAll('.navlist a')];
 const secs=links.map(a=>document.getElementById(a.dataset.t)).filter(Boolean);
 const spy=()=>{
  let cur=secs[0];
  for(const s of secs){if(s.getBoundingClientRect().top<=140)cur=s}
  links.forEach(a=>a.classList.toggle('on',a.dataset.t===(cur&&cur.id)));
 };
 window.addEventListener('scroll',spy,{passive:true});spy();
 links.forEach(a=>a.addEventListener('click',e=>{
  e.preventDefault();
  const t=document.getElementById(a.dataset.t);
  if(t)window.scrollTo({top:t.getBoundingClientRect().top+window.scrollY-24,behavior:'smooth'});
 }));
}
</script>
